# [L25] 跨语言契约护栏：每次 push / PR 跑五语言的 test-vectors 测试。
# 把「跨语言签名逐字节一致」从发版人工门槛升级为每次提交自动回归。
# 各语言测试步骤镜像 release.sh 中 run() 的命令（保持单一事实源一致）。
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Node.js —— node --test（与 release.sh 的 "Node" 步骤一致）
  nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: npm ci
        working-directory: nodejs
        run: npm ci
      - name: eslint
        working-directory: nodejs
        run: npm run lint
      - name: node --test
        working-directory: nodejs
        run: node --test

  # Python —— unittest discover（与 release.sh 的 "Python" 步骤一致）
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: install Ruff
        run: python -m pip install --disable-pip-version-check 'ruff==0.15.21'
      - name: ruff check
        working-directory: python
        run: ruff check .
      - name: python -m unittest
        working-directory: python
        run: python3 -m unittest discover -s tests

  # PHP —— 自写零依赖 runner（与 release.sh 的 "PHP" 步骤一致）
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          extensions: curl, json
      - name: composer install
        working-directory: php
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: phpstan
        working-directory: php
        run: composer run lint
      - name: php tests/run.php
        working-directory: php
        run: php tests/run.php

  # Java —— 自写断言 runner（与 release.sh 的 "Java" 步骤一致，不依赖 Maven）
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - name: bash run-tests.sh
        working-directory: java
        run: bash run-tests.sh
      - name: Maven verify with Checkstyle
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress verify

  # Go —— go test（与 release.sh 的 "Go" 步骤一致；-count=1 绕开缓存读外部向量）
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: go
      - name: go test
        working-directory: go
        run: go test -count=1 ./...
