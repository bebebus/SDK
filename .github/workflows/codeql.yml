name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '45 1 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python, java-kotlin, go]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild compiled languages
        if: matrix.language == 'java-kotlin' || matrix.language == 'go'
        uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: /language:${{ matrix.language }}
