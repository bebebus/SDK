name: Fuzzing

on:
  schedule:
    - cron: '15 2 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-fuzz:
    name: Go callback verification fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.21'

      - name: Run Go fuzz target
        working-directory: go
        run: go test -fuzz=FuzzVerifyCallbackNeverPanics -fuzztime=30s .
