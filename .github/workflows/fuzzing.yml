name: Fuzzing

on:
  schedule:
    - cron: '15 2 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-fuzz:
    name: Go callback verification fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21'

      - name: Run Go fuzz target
        working-directory: go
        run: go test -fuzz=FuzzVerifyCallbackNeverPanics -fuzztime=30s .
